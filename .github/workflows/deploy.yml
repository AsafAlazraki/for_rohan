name: CI / CD — Dynamics Marketo Sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      # Placeholder creds used only by integration tests that self-mock.
      # E2E tests are gated by E2E_RUN=1 (not set here).
      DYNAMICS_TENANT_ID: test-tenant
      DYNAMICS_CLIENT_ID: test-client
      DYNAMICS_CLIENT_SECRET: test-secret
      DYNAMICS_RESOURCE_URL: https://test.crm.dynamics.com
      DYNAMICS_WEBHOOK_SECRET: test-dyn-wh
      MARKETO_BASE_URL: https://test.mktorest.com
      MARKETO_CLIENT_ID: test-mkto-client
      MARKETO_CLIENT_SECRET: test-mkto-secret
      MARKETO_WEBHOOK_SECRET: test-mkto-wh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Run linter
        run: npm run lint || true

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ── 2. Build & push Docker image ──────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        run: |
          echo "TODO: wire up deployment target"
          echo "Image tag: ${{ needs.build.outputs.image_tag }}"
